/* ── CPI FLOATING BADGE ── */
.cpi-badge{
  position:fixed;bottom:18px;right:18px;z-index:9998;
  display:flex;align-items:center;gap:10px;
  padding:8px 16px 8px 10px;
  background:var(--bg,#f2f1ef);
  border:1px solid var(--border,#e0ddd8);
  border-radius:6px;
  box-shadow:0 4px 20px rgba(0,0,0,.12),0 1px 4px rgba(0,0,0,.06);
  cursor:default;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  opacity:0;
  transform:translateY(20px);
  animation:cpiBadgeIn .8s cubic-bezier(.34,1.56,.64,1) .6s forwards;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.cpi-badge:hover{
  transform:translateY(-2px)!important;
  box-shadow:0 8px 30px rgba(0,0,0,.18),0 2px 8px rgba(0,0,0,.1);
}
.cpi-badge-logo{
  width:52px;height:auto;
  animation:cpiLogoFloat 3s ease-in-out infinite;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.08));
}
.cpi-badge-text{
  display:flex;flex-direction:column;line-height:1;
}
.cpi-badge-powered{
  font-family:'Barlow Condensed',sans-serif;
  font-size:9px;font-weight:600;
  text-transform:uppercase;letter-spacing:.14em;
  color:var(--muted,#7a7a7a);
  margin-bottom:2px;
}
.cpi-badge-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:800;
  text-transform:uppercase;letter-spacing:.06em;
  background:linear-gradient(135deg,#c8102e 0%,#e63946 50%,#c8102e 100%);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:cpiShimmer 3s linear infinite;
}
.cpi-badge-tag{
  font-family:'JetBrains Mono',monospace;
  font-size:8px;letter-spacing:.06em;
  color:var(--muted,#7a7a7a);
  opacity:.6;margin-top:2px;
}
.cpi-badge-pulse{
  position:absolute;top:8px;right:8px;
  width:6px;height:6px;border-radius:50%;
  background:#c8102e;
  animation:cpiPulse 2s ease-in-out infinite;
}

/* Dark mode badge */
body.dark-mode .cpi-badge{
  background:rgba(26,26,25,.92)!important;
  border-color:#2a2a28!important;
  box-shadow:0 4px 20px rgba(0,0,0,.4),0 1px 4px rgba(0,0,0,.2)!important;
}
body.dark-mode .cpi-badge:hover{
  box-shadow:0 8px 30px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.3)!important;
}

/* Plant-specific accent on badge name */
body[data-plant="dallas"] .cpi-badge-name{
  background:linear-gradient(135deg,#0055a4 0%,#3388cc 50%,#0055a4 100%);
  background-size:200% auto;-webkit-background-clip:text;background-clip:text;
  animation:cpiShimmer 3s linear infinite;
}
body[data-plant="abq"] .cpi-badge-name{
  background:linear-gradient(135deg,#006b54 0%,#33a388 50%,#006b54 100%);
  background-size:200% auto;-webkit-background-clip:text;background-clip:text;
  animation:cpiShimmer 3s linear infinite;
}
body[data-plant="tus"] .cpi-badge-name{
  background:linear-gradient(135deg,#ea580c 0%,#f59e0b 50%,#ea580c 100%);
  background-size:200% auto;-webkit-background-clip:text;background-clip:text;
  animation:cpiShimmer 3s linear infinite;
}

/* Badge pulse dot matches plant */
body[data-plant="dallas"] .cpi-badge-pulse{background:#0055a4}
body[data-plant="abq"] .cpi-badge-pulse{background:#006b54}
body[data-plant="tus"] .cpi-badge-pulse{background:#ea580c}

@keyframes cpiBadgeIn{
  0%{opacity:0;transform:translateY(20px)}
  100%{opacity:1;transform:translateY(0)}
}
@keyframes cpiLogoFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-3px)}
}
@keyframes cpiShimmer{
  0%{background-position:0% center}
  100%{background-position:200% center}
}
@keyframes cpiPulse{
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(200,16,46,.4)}
  50%{opacity:.6;box-shadow:0 0 0 4px rgba(200,16,46,0)}
}

/* Mobile responsive */
@media(max-width:768px){
  .cpi-badge{bottom:10px;right:10px;padding:6px 12px 6px 8px;gap:8px}
  .cpi-badge-logo{width:38px}
  .cpi-badge-powered{font-size:8px}
  .cpi-badge-name{font-size:11px}
  .cpi-badge-tag{display:none}
}
@media print{.cpi-badge{display:none!important}}
