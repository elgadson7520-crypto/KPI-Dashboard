<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Value Stream Map Stencil Builder</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d8deea;
      --text: #1e2a3a;
      --accent: #2357ff;
    }
    body { margin: 0; font-family: Inter, Arial, sans-serif; color: var(--text); background: var(--bg); }
    .app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
    .stencil {
      background: var(--panel); border-right: 1px solid var(--line); padding: 16px; overflow-y: auto;
    }
    .stencil h1 { font-size: 18px; margin: 0 0 8px; }
    .muted { color: #657085; font-size: 12px; margin-bottom: 12px; }
    .tool-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    button {
      border: 1px solid var(--line); background: white; border-radius: 8px; padding: 8px 10px; cursor: pointer;
      font-size: 12px;
    }
    button.primary { background: var(--accent); color: white; border-color: var(--accent); }
    .symbol-template {
      border: 1px dashed #aeb8c7; border-radius: 8px; padding: 10px; margin-bottom: 10px; background: #fbfcff;
      cursor: grab; user-select: none;
    }
    .symbol-title { font-size: 12px; margin-bottom: 8px; color: #49556b; }
    .symbol-preview { position: relative; height: 70px; }

    .canvas-wrap { position: relative; overflow: auto; }
    .canvas {
      position: relative; width: 2000px; height: 1200px; background-image: linear-gradient(#edf1f7 1px, transparent 1px), linear-gradient(90deg, #edf1f7 1px, transparent 1px);
      background-size: 20px 20px;
    }
    #links { position: absolute; inset: 0; pointer-events: none; }

    .node {
      position: absolute; min-width: 120px; min-height: 58px; background: white; border: 2px solid #2f3d53; border-radius: 4px;
      box-shadow: 0 2px 7px rgba(28, 45, 79, 0.1); cursor: move; padding: 6px;
    }
    .node .label { font-weight: 700; font-size: 14px; text-align: center; }
    .node .meta { border-top: 1px solid #d5dbe6; margin-top: 6px; padding-top: 5px; font-size: 11px; line-height: 1.3; }
    .node.inventory {
      width: 0; height: 0; min-width: 0; min-height: 0; border-left: 28px solid transparent; border-right: 28px solid transparent;
      border-bottom: 46px solid #ffffff; background: transparent; box-shadow: none; padding: 0;
      filter: drop-shadow(0 2px 4px rgba(28,45,79,0.15));
    }
    .node.inventory::after {
      content: attr(data-label); position: absolute; left: -26px; top: 50px; width: 52px; text-align: center; font-size: 11px;
    }
    .node.supplier, .node.customer {
      min-width: 120px; min-height: 65px;
      clip-path: polygon(0% 0%, 70% 0%, 75% 15%, 80% 0%, 85% 15%, 90% 0%, 95% 15%, 100% 0%, 100% 100%, 0% 100%);
      padding-top: 14px;
    }
    .node.databox { min-width: 140px; min-height: 80px; }
    .node.selected { outline: 3px solid #86a6ff; }
    .hint { font-size: 12px; color: #6c7a90; margin-top: 8px; }
    textarea { width: 100%; min-height: 80px; font-family: monospace; font-size: 11px; }
  </style>
</head>
<body>
<div class="app">
  <aside class="stencil">
    <h1>VSM Stencil</h1>
    <div class="muted">Drag symbols onto canvas. Double-click text to rename.</div>
    <div class="tool-row">
      <button id="connectBtn">Connect</button>
      <button id="deleteBtn">Delete</button>
      <button id="clearBtn">Clear</button>
      <button id="exportBtn" class="primary">Export JSON</button>
      <button id="importBtn">Import JSON</button>
    </div>

    <div class="symbol-template" draggable="true" data-type="supplier">
      <div class="symbol-title">Supplier / Customer</div>
      <div class="symbol-preview"><div class="node supplier" style="position:absolute;left:8px;top:6px;width:120px;height:55px"><div class="label">Supplier</div></div></div>
    </div>

    <div class="symbol-template" draggable="true" data-type="process">
      <div class="symbol-title">Process Box</div>
      <div class="symbol-preview"><div class="node" style="position:absolute;left:8px;top:4px;width:130px;height:55px"><div class="label">Process</div></div></div>
    </div>

    <div class="symbol-template" draggable="true" data-type="databox">
      <div class="symbol-title">Data Box</div>
      <div class="symbol-preview"><div class="node databox" style="position:absolute;left:8px;top:4px;width:140px;height:72px"><div class="label">CT/PT/C/O</div><div class="meta">CT=60s<br>PT=50s</div></div></div>
    </div>

    <div class="symbol-template" draggable="true" data-type="inventory">
      <div class="symbol-title">Inventory Triangle</div>
      <div class="symbol-preview"><div class="node inventory" data-label="100 pcs" style="position:absolute;left:36px;top:10px"></div></div>
    </div>

    <div class="hint">Tip: Connect mode → click start node, then end node. Your map can be saved as JSON for reuse.</div>
    <textarea id="jsonBox" placeholder="Exported JSON appears here."></textarea>
  </aside>

  <main class="canvas-wrap">
    <svg id="links"><defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0, 10 4, 0 8" fill="#36445c"/></marker></defs></svg>
    <div id="canvas" class="canvas"></div>
  </main>
</div>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const svg = document.getElementById('links');
  const jsonBox = document.getElementById('jsonBox');
  const state = { nodes: [], links: [], seq: 1, mode: 'move', sourceNode: null };

  const defaults = {
    supplier: { w: 140, h: 68, label: 'Supplier', cls: 'supplier' },
    customer: { w: 140, h: 68, label: 'Customer', cls: 'customer' },
    process: { w: 140, h: 64, label: 'Process', cls: '' },
    databox: { w: 160, h: 96, label: 'CT=60s', cls: 'databox', meta: 'PT=50s\\nC/O=5m\\nUptime 95%' },
    inventory: { w: 56, h: 46, label: '100 pcs', cls: 'inventory' }
  };

  document.querySelectorAll('.symbol-template').forEach(t => {
    t.addEventListener('dragstart', e => e.dataTransfer.setData('type', t.dataset.type));
  });

  canvas.addEventListener('dragover', e => e.preventDefault());
  canvas.addEventListener('drop', e => {
    e.preventDefault();
    const type = e.dataTransfer.getData('type');
    if (!type) return;
    const rect = canvas.getBoundingClientRect();
    createNode(type, e.clientX - rect.left, e.clientY - rect.top);
  });

  function createNode(type, x, y) {
    const d = defaults[type] || defaults.process;
    const id = `n${state.seq++}`;
    const node = { id, type, x, y, w: d.w, h: d.h, label: d.label, meta: d.meta || '' };
    state.nodes.push(node);
    render();
  }

  function render() {
    canvas.querySelectorAll('.node').forEach(n => n.remove());
    state.nodes.forEach(n => {
      const el = document.createElement('div');
      el.className = `node ${defaults[n.type]?.cls || ''}`;
      el.style.left = `${n.x}px`; el.style.top = `${n.y}px`;
      el.dataset.id = n.id;
      if (n.type === 'inventory') {
        el.dataset.label = n.label;
      } else {
        el.innerHTML = `<div class="label">${n.label}</div>${n.meta ? `<div class="meta">${n.meta.replaceAll('\n','<br>')}</div>` : ''}`;
      }
      enableDrag(el);
      el.addEventListener('dblclick', () => {
        const newLabel = prompt('Label', n.label);
        if (newLabel !== null) n.label = newLabel;
        if (n.type === 'databox') {
          const newMeta = prompt('Meta lines (\\n for new line)', n.meta);
          if (newMeta !== null) n.meta = newMeta;
        }
        render();
      });
      el.addEventListener('click', e => {
        e.stopPropagation();
        selectNode(n.id);
        if (state.mode === 'connect') handleConnectClick(n.id);
      });
      canvas.appendChild(el);
    });
    drawLinks();
  }

  function drawLinks() {
    svg.setAttribute('width', canvas.clientWidth);
    svg.setAttribute('height', canvas.clientHeight);
    svg.innerHTML = '<defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0, 10 4, 0 8" fill="#36445c"/></marker></defs>';
    state.links.forEach(l => {
      const a = state.nodes.find(n => n.id === l.from);
      const b = state.nodes.find(n => n.id === l.to);
      if (!a || !b) return;
      const x1 = a.x + a.w / 2, y1 = a.y + a.h / 2;
      const x2 = b.x + b.w / 2, y2 = b.y + b.h / 2;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      line.setAttribute('stroke', '#36445c'); line.setAttribute('stroke-width', '2');
      line.setAttribute('marker-end', 'url(#arrow)');
      svg.appendChild(line);
    });
  }

  function enableDrag(el) {
    let startX, startY, originalX, originalY;
    el.onpointerdown = e => {
      if (state.mode === 'connect') return;
      el.setPointerCapture(e.pointerId);
      startX = e.clientX; startY = e.clientY;
      const n = state.nodes.find(x => x.id === el.dataset.id);
      originalX = n.x; originalY = n.y;
      const onMove = ev => {
        n.x = Math.max(0, originalX + ev.clientX - startX);
        n.y = Math.max(0, originalY + ev.clientY - startY);
        el.style.left = `${n.x}px`; el.style.top = `${n.y}px`;
        drawLinks();
      };
      const onUp = () => {
        el.removeEventListener('pointermove', onMove);
        el.removeEventListener('pointerup', onUp);
      };
      el.addEventListener('pointermove', onMove);
      el.addEventListener('pointerup', onUp);
    };
  }

  function selectNode(id) {
    document.querySelectorAll('.node').forEach(n => n.classList.toggle('selected', n.dataset.id === id));
    state.selectedId = id;
  }

  function handleConnectClick(id) {
    if (!state.sourceNode) {
      state.sourceNode = id;
      return;
    }
    if (id !== state.sourceNode) state.links.push({ from: state.sourceNode, to: id });
    state.sourceNode = null;
    render();
  }

  document.getElementById('connectBtn').onclick = () => {
    state.mode = state.mode === 'connect' ? 'move' : 'connect';
    state.sourceNode = null;
    document.getElementById('connectBtn').classList.toggle('primary', state.mode === 'connect');
  };
  document.getElementById('deleteBtn').onclick = () => {
    if (!state.selectedId) return;
    state.nodes = state.nodes.filter(n => n.id !== state.selectedId);
    state.links = state.links.filter(l => l.from !== state.selectedId && l.to !== state.selectedId);
    state.selectedId = null;
    render();
  };
  document.getElementById('clearBtn').onclick = () => {
    if (!confirm('Clear map?')) return;
    state.nodes = []; state.links = []; state.selectedId = null; render();
  };
  document.getElementById('exportBtn').onclick = () => {
    jsonBox.value = JSON.stringify({ nodes: state.nodes, links: state.links }, null, 2);
  };
  document.getElementById('importBtn').onclick = () => {
    try {
      const data = JSON.parse(jsonBox.value);
      state.nodes = Array.isArray(data.nodes) ? data.nodes : [];
      state.links = Array.isArray(data.links) ? data.links : [];
      state.seq = state.nodes.reduce((m, n) => Math.max(m, Number((n.id || 'n0').slice(1)) || 0), 0) + 1;
      render();
    } catch {
      alert('Invalid JSON');
    }
  };

  canvas.addEventListener('click', () => selectNode(null));

  // Seed starter map
  createNode('supplier', 120, 90);
  createNode('process', 400, 280);
  createNode('databox', 400, 370);
  createNode('inventory', 640, 315);
  createNode('process', 760, 280);
  state.nodes[4].label = 'Assembly';
  state.links.push({ from: 'n1', to: 'n2' }, { from: 'n2', to: 'n5' });
  render();
})();
</script>
</body>
</html>
